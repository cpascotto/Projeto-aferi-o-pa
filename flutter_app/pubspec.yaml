name: flutter_identification_mobile
description: Mobile-first MVP for patient identification by face + CPF fallback.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  camera: ^0.11.0+2
  google_mlkit_face_detection: ^0.11.0
  image: ^4.2.0
  http: ^1.2.1
  path_provider: ^2.1.4
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo_min.png
    - assets/images/logo_vincere.png
    - assets/images/botao_aparelho.png
    - assets/images/indicador_bracadeira.png
    - assets/images/detector_movimento.png
    - assets/images/oculos.png
    - assets/images/bone.png
